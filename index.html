<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Asset Intelligence</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #FBFAF6;
      color: #1A2540;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 36px;
      -webkit-font-smoothing: antialiased;
    }
    img.logo {
      width: clamp(70px, 12vw, 110px);
      height: auto;
      display: block;
    }
    a {
      color: inherit;
      text-decoration: none;
      font-size: clamp(20px, 4.5vw, 32px);
      letter-spacing: 0.02em;
      border-bottom: 1px solid transparent;
      padding-bottom: 4px;
      transition: border-color 0.3s ease;
    }
    a:hover { border-bottom-color: #1A2540; }
  </style>
</head>
<body>
  <img src="logo.png" alt="Private Asset Intelligence" class="logo" />
  <a href="mailto:contact@private-asset-intelligence.com">contact@private-asset-intelligence.com</a>
</body>
</html>
